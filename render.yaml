services:
  - type: web
    name: controle-cliente-api
    env: docker
    plan: free # Can be changed to paid later
    region: ohio
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false # Set this in Render dashboard
      - key: JWT_REFRESH_SECRET
        sync: false # Set this in Render dashboard
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false # Set this in Render dashboard (Netlify URL)
